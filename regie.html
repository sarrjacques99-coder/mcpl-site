<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Régie — Leads</title>
  <link rel="stylesheet" href="assets/style.css" />
  <style>
    .admin { max-width: 1180px; margin: 0 auto; padding: 40px 24px 80px; }
    .admin h1 { font-size: 30px; margin-bottom: 6px; }
    .admin .sub { color: var(--text-dim); margin-bottom: 28px; }
    .token-bar { display: flex; gap: 10px; margin-bottom: 28px; max-width: 480px; }
    .token-bar input { flex: 1; height: 44px; border-radius: 12px; background: rgba(255,255,255,0.06); border: 1px solid var(--border); padding: 0 14px; color: #fff; }
    .token-bar button { padding: 0 20px; border-radius: 12px; border: none; background: var(--grad); color: #fff; font-weight: 600; cursor: pointer; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
    .stat { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 18px; }
    .stat .n { font-family: 'Sora'; font-size: 30px; font-weight: 800; }
    .stat .l { color: var(--text-dim); font-size: 13px; margin-top: 4px; }
    .stat.green .n { color: var(--green); } .stat.orange .n { color: var(--orange); }
    table { width: 100%; border-collapse: collapse; background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
    th, td { text-align: left; padding: 13px 16px; font-size: 13px; border-bottom: 1px solid var(--border); }
    th { color: var(--text-dimmer); text-transform: uppercase; font-size: 11px; letter-spacing: 0.05em; }
    .badge { padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .badge.green { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge.orange { background: rgba(249,115,22,0.15); color: var(--orange); }
    .empty { padding: 48px; text-align: center; color: var(--text-dim); }
    .export { margin-bottom: 16px; padding: 9px 16px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg-card); color: #fff; cursor: pointer; font-size: 13px; }
    @media(max-width:680px){ .stats{grid-template-columns:repeat(2,1fr)} td:nth-child(4),th:nth-child(4){display:none} }
  </style>
</head>
<body>
  <div class="halos" aria-hidden="true"><div class="halo halo-blue"></div><div class="halo halo-purple"></div></div>
  <header><nav class="topnav"><a href="index.html" class="brand"><span class="brand-dot"></span>MCPL<span style="color:#64748b">.live</span></a></nav></header>

  <main class="admin">
    <h1>Régie — Leads en temps réel</h1>
    <p class="sub">Pilotage de la capture et de la relocalisation.</p>

    <div class="token-bar">
      <input type="password" id="token" placeholder="Token admin" />
      <button onclick="load()">Charger</button>
    </div>

    <div id="content"></div>
  </main>

  <script>
    async function load() {
      const token = document.getElementById("token").value.trim();
      if (!token) return;
      localStorage.setItem("mcpl_admin_token", token);
      const content = document.getElementById("content");
      content.innerHTML = "<p style='color:#94a3b8'>Chargement…</p>";
      try {
        const res = await fetch(`/.netlify/functions/list-leads?token=${encodeURIComponent(token)}`);
        if (res.status === 401) { content.innerHTML = "<p style='color:#f87171'>Token invalide.</p>"; return; }
        const data = await res.json();
        render(data.leads || []);
      } catch (e) {
        content.innerHTML = "<p style='color:#f87171'>Erreur de chargement.</p>";
      }
    }

    function render(leads) {
      const total = leads.length;
      const direct = leads.filter((l) => !l.is_relocated).length;
      const reloc = leads.filter((l) => l.is_relocated).length;
      const depts = new Set(leads.map((l) => l.departement)).size;

      const content = document.getElementById("content");
      if (total === 0) {
        content.innerHTML = `<div class="empty">Aucun lead pour l'instant. Les leads captés via le Smart Gate apparaîtront ici.</div>`;
        return;
      }

      const rows = leads.map((l) => `
        <tr>
          <td><strong>${l.first_name} ${l.last_name}</strong><br><span style="color:#64748b">${l.email}</span></td>
          <td>${l.company}</td>
          <td><strong>${l.postal_code}</strong></td>
          <td>${l.video_title || l.video_id}</td>
          <td>${l.is_relocated
            ? `<span class="badge orange">→ ${l.relocated_to_company || "À relocaliser"}</span>`
            : `<span class="badge green">Match direct</span>`}</td>
          <td style="color:#64748b">${new Date(l.created_at).toLocaleString("fr-FR")}</td>
        </tr>`).join("");

      content.innerHTML = `
        <div class="stats">
          <div class="stat"><div class="n">${total}</div><div class="l">Leads captés</div></div>
          <div class="stat green"><div class="n">${direct}</div><div class="l">Match direct</div></div>
          <div class="stat orange"><div class="n">${reloc}</div><div class="l">À relocaliser</div></div>
          <div class="stat"><div class="n">${depts}</div><div class="l">Départements</div></div>
        </div>
        <button class="export" onclick='exportCSV(${JSON.stringify(leads).replace(/'/g, "&#39;")})'>⬇ Exporter en CSV</button>
        <table>
          <thead><tr><th>Prospect</th><th>Société</th><th>CP</th><th>Replay</th><th>Statut</th><th>Date</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    function exportCSV(leads) {
      const headers = ["first_name","last_name","email","company","postal_code","departement","video_title","is_relocated","relocated_to_company","created_at"];
      const lines = [headers.join(",")];
      leads.forEach((l) => lines.push(headers.map((h) => `"${(l[h] ?? "").toString().replace(/"/g,'""')}"`).join(",")));
      // BOM UTF-8 (\uFEFF) pour qu'Excel ouvre le CSV en UTF-8, pas en latin-1
      const blob = new Blob(["\uFEFF" + lines.join("\n")], { type: "text/csv;charset=utf-8" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `leads-mcpl-${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
    }

    // Pré-remplir si token déjà saisi
    const saved = localStorage.getItem("mcpl_admin_token");
    if (saved) { document.getElementById("token").value = saved; load(); }
  </script>
</body>
</html>
